services:
  opencode:
    build:
      context: .
      args:
        - INSTALL_JAVA=${INSTALL_JAVA:-false}
        - INSTALL_RUBY=${INSTALL_RUBY:-false}
        - INSTALL_SWIFT=${INSTALL_SWIFT:-false}
        - INSTALL_ELIXIR=${INSTALL_ELIXIR:-false}
        - OMO_VERSION=${OMO_VERSION:-3.14.0}
    container_name: opencode
    ports:
      - "${OPENCODE_BIND_ADDRESS:-127.0.0.1}:${OPENCODE_PORT:-4000}:${OPENCODE_PORT:-4000}"
    volumes:
      - ./opencode-config:/home/opencode/.config/opencode
      - ./opencode-data:/home/opencode/.local/share/opencode
      - ./opencode-state:/home/opencode/.local/state/opencode
      - ./opencode-workspace:/home/opencode/workspace
      - ./skills:/home/opencode/.agents/skills:ro
    environment:
      # WARNING: Container binds 0.0.0.0 internally (required for port forwarding).
      # Set OPENCODE_BIND_ADDRESS (host-level) and OPENCODE_SERVER_PASSWORD to restrict access.
      - OPENCODE_MODE=${OPENCODE_MODE:-web}
      - OPENCODE_PORT=${OPENCODE_PORT:-4000}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:?ZHIPU_API_KEY is required}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${OPENCODE_PORT:-4000}/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
