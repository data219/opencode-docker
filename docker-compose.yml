services:
  opencode:
    build:
      context: .
      secrets:
        - source: github_token
          target: github_token
        - source: github_token_alt
          target: github_token_alt
      args:
        - INSTALL_JAVA=${INSTALL_JAVA:-false}
        - INSTALL_RUBY=${INSTALL_RUBY:-false}
        - INSTALL_SWIFT=${INSTALL_SWIFT:-false}
        - INSTALL_ELIXIR=${INSTALL_ELIXIR:-false}
        - INSTALL_NVM=${INSTALL_NVM:-false}
        - INSTALL_RUST=${INSTALL_RUST:-false}
    container_name: ${OPENCODE_CONTAINER_NAME:-opencode}
    ports:
      - '${OPENCODE_BIND_ADDRESS:-127.0.0.1}:${OPENCODE_PORT:-4000}:${OPENCODE_PORT:-4000}'
      - '${OPENCODE_BIND_ADDRESS:-127.0.0.1}:${OPENCHAMBER_PORT:-4020}:${OPENCHAMBER_PORT:-4020}'
    volumes:
      - ${OPENCODE_HOME_DIR:-./data/home}:/home/opencode
      - ${OPENCODE_DOCKER_SOCKET_BIND:-./.docker-socket-disabled}:/var/run/docker.sock
    environment:
      # WARNING: Container binds 0.0.0.0 internally (required for port forwarding).
      # Set OPENCODE_BIND_ADDRESS (host-level) and OPENCODE_SERVER_PASSWORD to restrict access.
      - OPENCODE_MODE=${OPENCODE_MODE:-web}
      - OPENCODE_CONFIG_VARIANT=${OPENCODE_CONFIG_VARIANT:-openai-chatgpt}
      - OPENCODE_PORT=${OPENCODE_PORT:-4000}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - OPENCODE_CORS=${OPENCODE_CORS:-}
      - OPENCODE_PRINT_LOGS=${OPENCODE_PRINT_LOGS:-false}
      - OPENCODE_LOG_LEVEL=${OPENCODE_LOG_LEVEL:-}
      - OPENCODE_DOTFILES_REPO=${OPENCODE_DOTFILES_REPO:-}
      - FORCE_SKILL_SYNC=${FORCE_SKILL_SYNC:-false}
      - OPENCHAMBER_ENABLED=${OPENCHAMBER_ENABLED:-false}
      - OPENCHAMBER_PORT=${OPENCHAMBER_PORT:-4020}
      - OPENCHAMBER_UI_PASSWORD=${OPENCHAMBER_UI_PASSWORD:-}
      - OPENCODE_DOCKER_SOCKET=${OPENCODE_DOCKER_SOCKET_BIND:+/var/run/docker.sock}
      - DOCKER_HOST=${OPENCODE_DOCKER_SOCKET_BIND:+unix:///var/run/docker.sock}
      - OCD_ZHIPU_API_KEY=${OCD_ZHIPU_API_KEY:-}
      # Optional: Google AI Studio API key for Gemini vision model (multimodal-looker agent).
      # Only needed if you want vision/multimodal features; without it the agent falls back to the default Z.AI model.
      - OCD_GEMINI_API_KEY=${OCD_GEMINI_API_KEY:-}
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GLAB_TOKEN=${GLAB_TOKEN:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - CNTB_OAUTH2_CLIENT_ID=${CNTB_OAUTH2_CLIENT_ID:-}
      - CNTB_OAUTH2_CLIENT_SECRET=${CNTB_OAUTH2_CLIENT_SECRET:-}
      - CNTB_OAUTH2_USER=${CNTB_OAUTH2_USER:-}
      - CNTB_OAUTH2_PASSWORD=${CNTB_OAUTH2_PASSWORD:-}
      # Git identity defaults are mapped to internal env names so runtime
      # git commands are not forced via reserved GIT_* override variables.
      - OPENCODE_GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-}
      - OPENCODE_GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-}
      - OPENCODE_GIT_COMMITTER_NAME=${GIT_COMMITTER_NAME:-}
      - OPENCODE_GIT_COMMITTER_EMAIL=${GIT_COMMITTER_EMAIL:-}
      - ATLCLI_API_TOKEN=${ATLCLI_API_TOKEN:-}
      - ATLCLI_EMAIL=${ATLCLI_EMAIL:-}
      - ATLCLI_SITE=${ATLCLI_SITE:-}
      - ATLCLI_BASE_URL=${ATLCLI_BASE_URL:-}
      - DOKPLOY_URL=${DOKPLOY_URL:-}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'curl', '-f', 'http://127.0.0.1:${OPENCODE_PORT:-4000}/health']
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: ["tunnel", "--url", "http://${CF_TUNNEL_TARGET_HOST:-opencode}:${CF_TUNNEL_TARGET_PORT:-${OPENCODE_PORT:-4000}}"]
    depends_on:
      opencode:
        condition: service_healthy
    profiles:
      - tunnel-quick

  cloudflared-managed:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-managed
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN:-}
    depends_on:
      opencode:
        condition: service_healthy
    profiles:
      - tunnel-managed

secrets:
  github_token:
    environment: GH_TOKEN
  github_token_alt:
    environment: GITHUB_TOKEN
