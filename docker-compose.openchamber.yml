# OpenChamber shortcut — enables OpenChamber without editing .env:
#   docker compose -f docker-compose.yml -f docker-compose.openchamber.yml up -d
# Alternatively, set OPENCHAMBER_ENABLED=true in .env and use plain:
#   docker compose up -d  (or task up)
services:
  opencode:
    environment:
      - OPENCHAMBER_ENABLED=true
