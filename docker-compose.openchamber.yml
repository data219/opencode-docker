# OpenChamber override - activate with:
#   docker compose -f docker-compose.yml -f docker-compose.openchamber.yml up -d
# This publishes the OpenChamber port and enables the service.
# See .env.example for per-setting documentation.
services:
  opencode:
    ports:
      - '${OPENCODE_BIND_ADDRESS:-127.0.0.1}:${OPENCHAMBER_PORT:-4020}:${OPENCHAMBER_PORT:-4020}'
    environment:
      - OPENCHAMBER_ENABLED=true
